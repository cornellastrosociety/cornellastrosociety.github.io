<!DOCTYPE html>
<html lang="en">

<head>
</head>

<body style="display: flex; align-items: center; justify-content: center;">
    <form name="subscribeform" id="subscribeform" action="https://lists.cornell.edu/subscribe/" target="sub" method="POST">
        <table>
            <tr>
                <td align="right">
                    <font size=4.5>Email: </font>
                </td>
                <td>
                    <input type="text" name="email" value="" SIZE=15 placeholder="Email address">
                </td>
                <td>
                    <input type="submit" class="btn" value="subscribe" title="subscribe" alt="subscribe"
                        name="subscribe" align="left" id="subscribeclick">
                </td>
            </tr>
            <tr>
                <td align="right">
                    <font size=4.5><I>Name (optional): </font>
                </td>
                <td>
                    <INPUT TYPE="text" NAME="name" VALUE="" SIZE=15 MAXLENGTH=150 placeholder="Name (optional)">
                </td>
            </tr>
        </table>
        <input type="hidden" name="list" value="cas-L@lists.cornell.edu">
        <input type="hidden" name="submit" value="submit">
        <input type="hidden" name="action" value="subscribe">

    </form>

    <div id="confirmation" style="color: white;" hidden>If your request was valid, you'll receive an email to confirm your request. Thank you for subscribing!</div>
</body>

<script>
    document.getElementById('subscribeclick').onclick = () => {
        document.getElementById('subscribeform').hidden = true;
        document.getElementById('confirmation').hidden = false;
    }
</script>

</html>
